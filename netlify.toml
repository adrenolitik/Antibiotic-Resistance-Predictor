[build]
  command = "pip install -r requirements.txt"
  publish = "."

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/streamlit/:splat"
  status = 200

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[dev]
  command = "streamlit run main.py --server.port 8888"
  port = 8888
  targetPort = 8501
  publish = "."
  autoLaunch = false
